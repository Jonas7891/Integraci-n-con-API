<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Carritos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body>

    <div class="container">
        <br><br>

        <h1>Gestión de Carritos de Compra</h1>

        <!-- FILTROS DE BÚSQUEDA SIMPLES -->
        <div class="row mt-4">
            <div class="col-md-3">
                <label>Buscar por ID</label>
                <input id="idFilter" type="number" class="form-control" placeholder="ID" onchange="getFindByIdCarts()">
            </div>
            <div class="col-md-3">
                <label>Buscar por Total</label>
                <input id="totalFilter" type="number" class="form-control" placeholder="Total"
                    onchange="getFindByTotalCarts()">
            </div>
            <div class="col-md-3">
                <label>Buscar por Total c/Descuento</label>
                <input id="discountFilter" type="number" class="form-control" placeholder="Con descuento"
                    onchange="getFindByDiscountCarts()">
            </div>
            <div class="col-md-3 d-flex align-items-end">
                <button class="btn btn-success w-100" onclick="getAllCarts()">Ver Todos</button>
            </div>
        </div>

        <!-- FORMULARIO DE CREACIÓN CARRITO COMPRAS -->
        <br>
        <h1 style="text-align: left;">Crear Carrito</h1>

        <div id="productsContainer"></div>

        <br>
        <button class="btn btn-secondary" onclick="addProductRow()">
            + Agregar Producto
        </button>
        <button id="btnCreateCart" class="btn btn-success" onclick="createCarts()" style="padding: 5px;">
            Crear Carrito
        </button>

        <br><br>

        <!-- TABLA DE CARRITOS -->
        <table class="table table-striped table-hover">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Productos en Carrito</th>
                    <th>Total del Carrito</th>
                    <th>Cantidad Total de Productos</th>
                    <th>Usuario</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="container">
            </tbody>
        </table>
    </div>

    <!-- MODAL ACTUALIZAR SIMPLE -->
    <div class="modal fade" id="modalActualizarCarts" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title">Actualizar Carrito</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <label>ID del Carrito</label>
                    <input id="updateId" class="form-control mb-3" readonly>

                    <label>Total</label>
                    <input id="updateTotal" type="number" step="0.01" class="form-control mb-3">

                    <label>Total con Descuento</label>
                    <input id="updateDiscountedTotal" type="number" step="0.01" class="form-control mb-3">

                    <label>ID del Usuario</label>
                    <input id="updateUserId" type="number" class="form-control mb-3">
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button class="btn btn-primary" onclick="updateCart()">Actualizar</button>
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL ELIMINAR SIMPLE -->
    <div class="modal fade" id="modalEliminarCarts" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-danger text-white">
                    <h5 class="modal-title">Eliminar Carrito</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p>¿Estás seguro de eliminar el carrito?</p>
                    <label>ID del Carrito</label>
                    <input id="deleteId" class="form-control mb-3" readonly>
                    <label>Total</label>
                    <input id="deleteTotal" class="form-control" readonly>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button class="btn btn-danger" onclick="deleteCarts()">Eliminar</button>
                </div>
            </div>
        </div>
    </div>

    <script src="/web/js/carts.js"></script>
    <script src="/web/js/navbar.js"></script>

</body>

</html>
