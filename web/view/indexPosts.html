<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Publicaciones</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body>

    <div class="container">
        <br><br>

        <h1>Lista de Publicaciones</h1>

        <div class="container text-left">
            <div class="row align-items-left">
                <div class="col">
                    <!-- BUSCAR POR ID -->
                    <label>Buscar por ID</label>
                    <input id="idFilter" type="text" class="form-control" onchange="getFindByIdPosts()">
                </div>
                <div class="col">
                    <!-- BUSCAR POR TITULO -->
                    <label>Buscar por Titulo</label>
                    <input id="titleFilter" type="text" class="form-control" onchange="getFindByTitlePosts()">
                </div>
                <div class="col">
                    <!-- BUSCAR POR VISUALIZACIONES -->
                    <label>Buscar por visualizaciones</label>
                    <input id="viewFilter" type="text" class="form-control" onchange="getFindByViewPosts()">
                </div>
            </div>
        </div>

        <br><br>
        <h1 style="text-align: left;">Crear Usuario</h1>
        <div class="container text-left">
            <div class="row align-items-left">
                <div class="col">
                    <label>Ingrese Titulo de la Publicacion</label>
                    <input id="titleCreate" type="text" class="form-control">
                </div>
                <div class="col">
                    <label>Ingrese Cuerpo de la Publicacion</label>
                    <input id="bodyCreate" type="text" class="form-control">
                </div>
                <div class="col d-flex align-items-end">
                    <button class="btn btn-success" onclick="createPost()">
                        Crear Publicacion
                    </button>
                </div>
            </div>
        </div>
        <br>

        <button class="btn btn-success" onclick="getAllPosts()">Consultar todos</button>

        <br><br>

        <table class="table">
            <thead>
                <tr>
                    <th>Id</th>
                    <th>Title</th>
                    <th>Body</th>
                    <th>Views</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="container">
            </tbody>
        </table>
    </div>

    <!-- MODAL ACTUALIZAR -->
    <div class="modal fade" id="modalActualizarPosts" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Actualizar registro</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <label>ID</label>
                    <input id="updateId" class="form-control mb-2" readonly>
                    <label>Titulo de la Publicacion</label>
                    <input id="updateTitle" class="form-control mb-2">
                    <label>Cuerpo de la publicacion</label>
                    <input id="updateBody" class="form-control mb-2">
                    <label>Visualizaciones</label>
                    <input id="updateView" class="form-control mb-2" readonly>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button class="btn btn-primary" onclick="updatePost()">Actualizar</button>
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL ELIMINAR -->
    <div class="modal fade" id="modalEliminarPosts" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Eliminar registro</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <label>Titulo de Publicacion a Eliminar</label>
                    <input id="deleteTitle" class="form-control" readonly>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button class="btn btn-danger" onclick="deletePosts()">Eliminar</button>
                </div>
            </div>
        </div>
    </div>

    <script src="/web/js/posts.js"></script>
    <script src="/web/js/navbar.js"></script>

</body>

</html>
