<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de productos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body>

    <div class="container">
        <br><br>

        <h1>Lista productos</h1>

        <div class="container text-left">
            <div class="row align-items-left">
                <div class="col">
                    <!-- BUSCAR POR ID -->
                    <label>Buscar por ID</label>
                    <input id="idFilter" type="text" class="form-control" onchange="getFindByIdProduct()">
                </div>
                <div class="col">
                    <!-- BUSCAR POR TITULO -->
                    <label>Buscar por Titulo</label>
                    <input id="titleFilter" type="text" class="form-control" onchange="getFindByTitleProduct()">
                </div>
                <div class="col">
                    <!-- BUSCAR POR PRECIO -->
                    <label>Buscar por Precio</label>
                    <input id="priceFilter" type="number" class="form-control" onchange="getFindByPriceProduct()">
                </div>
            </div>
        </div>

        <br><br>
        <h1 style="text-align: left;">Crear Producto</h1>
        <div class="container text-left">
            <div class="row align-items-left">
                <div class="col">
                    <label>Ingrese Titulo</label>
                    <input id="titleCreate" type="text" class="form-control">
                </div>
                <div class="col">
                    <label>Ingrese Precio</label>
                    <input id="priceCreate" type="number" class="form-control">
                </div>
                <div class="col d-flex align-items-end">
                    <button class="btn btn-success" onclick="createProduct()">
                        Crear Producto
                    </button>
                </div>
            </div>
        </div>
        <br>

        <button class="btn btn-success" onclick="getAllProducts()">Consultar todos</button>

        <br><br>

        <table class="table">
            <thead>
                <tr>
                    <th>Id</th>
                    <th>Title</th>
                    <th>Price</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="containerProducts">
            </tbody>
        </table>
    </div>


    <!-- MODAL ACTUALIZAR -->

    <div class="modal fade" id="modalActualizarProduct" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Actualizar registro</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <label>ID</label>
                    <input id="updateId" class="form-control mb-2" readonly>
                    <label>Title</label>
                    <input id="updateTitle" class="form-control mb-2">
                    <label>Price</label>
                    <input id="updatePrice" class="form-control">
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button class="btn btn-primary" onclick="updateProduct()">Actualizar</button>
                </div>
            </div>
        </div>
    </div>


    <!-- MODAL ELIMINAR -->

    <div class="modal fade" id="modalEliminarProduct" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Eliminar registro</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <label>Producto a eliminar</label>
                    <input id="deleteTitle" class="form-control" readonly>

                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button class="btn btn-danger" onclick="deleteProduct()" data-bs-dismiss="modal">Eliminar</button>
                </div>
            </div>
        </div>
    </div>

    <script src="/web/js/navbar.js"></script>
    <script src="/web/js/products.js"></script>

</body>

</html>
