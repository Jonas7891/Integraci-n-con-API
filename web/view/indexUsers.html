<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Usuarios</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body>

    <div class="container">
        <br><br>

        <h1>Lista Usuarios</h1>

        <div class="container text-left">
            <div class="row align-items-left">
                <div class="col">
                    <!-- BUSCAR POR ID -->
                    <label>Buscar por ID</label>
                    <input id="idFilter" type="text" class="form-control" onchange="getFindByIdUser()">
                </div>
                <div class="col">
                    <!-- BUSCAR POR USUARIO -->
                    <label>Buscar por Usuario</label>
                    <input id="usernameFilter" type="text" class="form-control" onchange="getFindByUsernameUser()">
                </div>
                <div class="col">
                    <!-- BUSCAR POR TELEFONO -->
                    <label>Buscar por Telefono</label>
                    <input id="phoneFilter" type="text" class="form-control" onchange="getFindByPhoneUser()">
                </div>
            </div>
        </div>

        <br><br>
        <h1 style="text-align: left;">Crear Usuario</h1>
        <div class="container text-left">
            <div class="row align-items-left">
                <div class="col">
                    <label>Ingrese Nombre de Usuario</label>
                    <input id="usernameCreate" type="text" class="form-control">
                </div>
                <div class="col">
                    <label>Ingrese Telefono</label>
                    <input id="phoneCreate" type="text" class="form-control">
                </div>
                <div class="col">
                    <label>Ingrese Edad</label>
                    <input id="ageCreate" type="number" class="form-control">
                </div>
                <div class="col d-flex align-items-end">
                    <button class="btn btn-success" onclick="createUser()">
                        Crear Usuario
                    </button>
                </div>
            </div>
        </div>
        <br>

        <button class="btn btn-success" onclick="getAllUsers()">Consultar todos</button>

        <br><br>

        <table class="table">
            <thead>
                <tr>
                    <th>Id</th>
                    <th>Username</th>
                    <th>Phone</th>
                    <th>Age</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="container">
            </tbody>
        </table>
    </div>

    <!-- MODAL ACTUALIZAR -->
    <div class="modal fade" id="modalActualizarUser" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Actualizar registro</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <label>ID</label>
                    <input id="updateId" class="form-control mb-2" readonly>
                    <label>Nombre de Usuario</label>
                    <input id="updateUsername" class="form-control mb-2">
                    <label>Teléfono</label>
                    <input id="updatePhone" class="form-control mb-2">
                    <label>Años</label>
                    <input id="updateAge" class="form-control">
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button class="btn btn-primary" onclick="updateUser()">Actualizar</button>
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL ELIMINAR -->
    <div class="modal fade" id="modalEliminarUser" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Eliminar registro</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <label>Teléfono del usuario a eliminar</label>
                    <input id="deletePhone" class="form-control" readonly>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button class="btn btn-danger" onclick="deleteUser()">Eliminar</button>
                </div>
            </div>
        </div>
    </div>

    <script src="/web/js/users.js"></script>
    <script src="/web/js/navbar.js"></script>

</body>

</html>
